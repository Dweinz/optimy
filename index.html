<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d130b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seven Seas" />
    <link rel="icon" href="./icon-192.svg" />
    <link rel="apple-touch-icon" href="./icon-192.svg" />
    <title>Seven Seas Idle</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <h1>⚓ Seven Seas Idle</h1>
        <div id="topbar-stats"></div>
        <div id="topbar-buttons">
          <button id="btn-install" class="btn small" data-tip="Add to your home screen"><span class="btn-icon">📲</span><span class="btn-text"> Install</span></button>
          <button id="btn-save" class="btn small" data-tip="Save the game now"><span class="btn-icon">💾</span><span class="btn-text"> Save</span></button>
          <button id="btn-export" class="btn small" data-tip="Copy save data to clipboard"><span class="btn-icon">📤</span><span class="btn-text"> Export</span></button>
          <button id="btn-import" class="btn small" data-tip="Import a save string"><span class="btn-icon">📥</span><span class="btn-text"> Import</span></button>
          <button id="btn-help" class="btn small" data-tip="Replay the tour">❓</button>
        </div>
      </header>
      <div id="layout">
        <nav id="tabs"></nav>
        <main id="content"></main>
        <aside id="side">
          <div id="scene-container"></div>
          <div id="activity-box"></div>
          <div id="goal-box"></div>
          <div id="event-log-box">
            <h3>📜 Captain's Log</h3>
            <div id="event-log"></div>
          </div>
        </aside>
      </div>
      <div id="notifications"></div>
      <div id="modal-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
